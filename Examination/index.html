<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dream House</title>
    <script src="script/aframe.js"></script>
</head>
<body>
    <a-scene shadow="type: pcfsoft" fog="type: exponential; color: #ACE2E1; density: 0.002">
        
        <a-assets>
            <img src="images/sky.jpg" id="sky">
            <img src="images/brick.jpg" id="brick"> 
            <img src="images/pexels-photo.jpeg" id="Layout">                  
            <a-asset-item src="dream_house/scene.gltf" id="House"></a-asset-item>
            <a-asset-item src="aston_martin_db11/aston_martin.glb" id="car"></a-asset-item>
            <a-asset-item src="realistic_palm_tree_4_free/scene.gltf" id="Coconut"></a-asset-item>
            <a-asset-item src="fence/scene.gltf" id="Fence"></a-asset-item>
            <a-assets>
    <a-asset-item src="aston_martin_db11/aston_martin.glb" id="astonMartin"></a-asset-item>
</a-assets>
        </a-assets>

        <a-entity light="type: ambient; color: #BBB; intensity: 0.5;"></a-entity>
        <a-entity light="type: directional; color: #FFF; intensity: 0.8; castShadow: true; shadowCameraFar: 500; shadowMapHeight: 1024; shadowMapWidth: 1024" 
                  position="-10 50 50"></a-entity>

        <a-entity gltf-model="#House" scale="8 8 4.5" position="0 4 80" shadow="receive: true; cast: true"></a-entity>
        <a-entity glb-model="#car" scale="8 8 4.5" position="50 0 100" shadow="cast: true"></a-entity>
        
        
        <a-water
            opacity="0.6"
            side="double"
            width="20"
            height="90"
            base-color="#0077be"
            foam-color="#ffffff"
            repeat="20"
            rotation="90 0 0"
            position="-190 0.40 -60"
            scale="1.5 4.5 5"
            animation="property: scale; to: 1.52 4.52 5; dur: 2000; loop: true; dir: alternate; easing: easeInOutSine">
        </a-water>

        <a-entity id="palm-trees">
            <a-entity gltf-model="#Coconut" scale="4 4 4" position="5 0 80"></a-entity>
            <a-entity gltf-model="#Coconut" scale="4 4 4" position="31 0 80"></a-entity>
            <a-entity gltf-model="#Coconut" scale="4 4 4" position="75 0 82"></a-entity>
            <a-entity gltf-model="#Coconut" scale="4 4 4" position="-55 0 80"></a-entity>
            <a-entity gltf-model="#Coconut" scale="4 4 4" position="-110 0 80"></a-entity>
            </a-entity>

        <a-entity id="fences">
            <a-entity gltf-model="#Fence" scale="1 1 1" position="57 1 80"></a-entity>
            <a-entity gltf-model="#Fence" scale="1 1 1" position="34 1 80"></a-entity>
            <a-entity gltf-model="#Fence" scale="1 1 1" position="-20 1 80"></a-entity>
            <a-entity gltf-model="#Fence" scale="1 1 1" position="-43 1 80"></a-entity>
            <a-entity gltf-model="#Fence" scale="1 1 1" position="-66 1 80"></a-entity>
            <a-entity gltf-model="#Fence" scale="1 1 1" position="-89 1 80"></a-entity>
            <a-entity gltf-model="#Fence" scale="1 1 1" position="-112 1 80"></a-entity>
        </a-entity>

        <a-sky src="#sky" rotation="0 -90 0"></a-sky>
        <a-plane
            src="#brick"
            rotation="-90 0 0"
            width="1000"
            height="1000"
            repeat="100 100"
            roughness="1"
            shadow="receive: true">
        </a-plane>

        <a-entity id="pavement-stones">
            <a-box depth="15" width="20" height="0.5" position="18 0.1 80" src="#Layout" material="repeat:3 5"></a-box>
            <a-box depth="15" width="20" height="0.5" position="18 0.1 100" src="#Layout" material="repeat:3 5"></a-box>
            <a-box depth="15" width="20" height="0.5" position="18 0.1 120" src="#Layout" material="repeat:3 5"></a-box>
        </a-entity>

        <a-entity 
    gltf-model="#astonMartin" 
    scale="8 8 8" 
    position="40 0 107" 
    rotation="0 0 0" 
    shadow="cast: true">
</a-entity>

    <a-entity id="rig" position="10 40 170">
    <a-camera wasd-controls="acceleration: 120" look-controls>
    </a-camera>
</a-entity>

    </a-scene>
</body>
</html>
